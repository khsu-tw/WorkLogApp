name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── GUI Client Builds ────────────────────────────────────────────────────────

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Windows executable
        run: |
          cd docs/build
          pyinstaller --clean worklog.spec

      - name: Package Windows build
        run: |
          cd docs/build/dist
          Copy-Item ../launch_debug.bat WorkLog/
          Copy-Item ../PACKAGE_README.md WorkLog/README.txt
          Compress-Archive -Path WorkLog -DestinationPath WorkLog-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkLog-Windows
          path: docs/build/dist/WorkLog-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Pillow
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libjpeg-dev libpng-dev libtiff-dev libfreetype6-dev liblcms2-dev libwebp-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Linux executable
        run: |
          cd docs/build
          pyinstaller --clean worklog_linux.spec

      - name: Package Linux build
        run: |
          cd docs/build/dist
          cp ../launch_debug.sh WorkLog/
          cp ../PACKAGE_README.md WorkLog/README.txt
          chmod +x WorkLog/launch_debug.sh
          tar -czf WorkLog-Linux.tar.gz WorkLog/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkLog-Linux
          path: docs/build/dist/WorkLog-Linux.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tkinter
        run: brew install python-tk@3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build macOS executable
        run: |
          cd docs/build
          pyinstaller --clean worklog_mac.spec

      - name: Package macOS build
        run: |
          cd docs/build/dist
          cp ../launch_debug.sh ./
          cp ../PACKAGE_README.md README.txt
          chmod +x launch_debug.sh
          tar -czf WorkLog-macOS.tar.gz WorkLog.app/ launch_debug.sh README.txt

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkLog-macOS
          path: docs/build/dist/WorkLog-macOS.tar.gz

  # ── WorkLogServer Builds (headless, no GUI) ──────────────────────────────────

  build-linux-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Pillow
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libjpeg-dev libpng-dev libtiff-dev libfreetype6-dev liblcms2-dev libwebp-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build WorkLogServer (Linux)
        run: |
          cd docs/build
          pyinstaller --clean worklog_server_linux.spec

      - name: Package Linux server build
        run: |
          cd docs/build/dist
          cp ../launch_debug.sh WorkLogServer/
          cp ../PACKAGE_README.md WorkLogServer/README.txt
          chmod +x WorkLogServer/launch_debug.sh
          tar -czf WorkLogServer-Linux.tar.gz WorkLogServer/

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkLogServer-Linux
          path: docs/build/dist/WorkLogServer-Linux.tar.gz

  build-macos-server:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build WorkLogServer (macOS)
        run: |
          cd docs/build
          pyinstaller --clean worklog_server_mac.spec

      - name: Package macOS server build
        run: |
          cd docs/build/dist
          cp ../launch_debug.sh WorkLogServer/
          cp ../PACKAGE_README.md WorkLogServer/README.txt
          chmod +x WorkLogServer/launch_debug.sh
          tar -czf WorkLogServer-macOS.tar.gz WorkLogServer/

      - name: Upload macOS server artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkLogServer-macOS
          path: docs/build/dist/WorkLogServer-macOS.tar.gz

  build-pi-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARMv7
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build WorkLogServer for Raspberry Pi (ARMv7)
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v "$PWD:/workspace" -w /workspace \
            python:3.11-slim-bullseye \
            bash -c "
              apt-get update -qq && apt-get install -y -qq libpq-dev gcc build-essential libffi-dev libssl-dev zlib1g-dev libjpeg-dev libpng-dev libtiff-dev libfreetype6-dev liblcms2-dev libwebp-dev &&
              pip install --upgrade pip --quiet &&
              pip install -r requirements.txt --quiet &&
              pip install pyinstaller --quiet &&
              cd docs/build &&
              pyinstaller --clean worklog_server_linux.spec
            "

      - name: Package Raspberry Pi server build
        run: |
          cd docs/build/dist
          cp ../launch_debug.sh WorkLogServer/
          cp ../PACKAGE_README.md WorkLogServer/README.txt
          chmod +x WorkLogServer/launch_debug.sh
          tar -czf WorkLogServer-RaspberryPi.tar.gz WorkLogServer/

      - name: Upload Raspberry Pi server artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkLogServer-RaspberryPi
          path: docs/build/dist/WorkLogServer-RaspberryPi.tar.gz

  # ── Create GitHub Release ────────────────────────────────────────────────────

  create-release:
    needs: [build-windows, build-linux, build-macos, build-linux-server, build-macos-server, build-pi-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/WorkLog-Windows/WorkLog-Windows.zip
            artifacts/WorkLog-Linux/WorkLog-Linux.tar.gz
            artifacts/WorkLog-macOS/WorkLog-macOS.tar.gz
            artifacts/WorkLogServer-Linux/WorkLogServer-Linux.tar.gz
            artifacts/WorkLogServer-macOS/WorkLogServer-macOS.tar.gz
            artifacts/WorkLogServer-RaspberryPi/WorkLogServer-RaspberryPi.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
